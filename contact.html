<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Swati Deshpande Designs</title>
  <meta name="description" content="Get in touch with Swati Deshpande for interior design and architectural consultations in Pune.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="contact">

  <nav class="nav" id="site-nav"></nav>

  <div class="page-hero">
    <div class="container">
      <h1>Get In Touch</h1>
      <p id="contact-subtitle"></p>
    </div>
  </div>

  <section>
    <div class="container">
      <div class="contact-grid">

        <!-- Contact info -->
        <div>
          <span class="section-label reveal">Contact Details</span>
          <h2 class="reveal" style="margin-bottom:2rem; font-size:2rem;">Let's Talk About<br>Your Project</h2>
          <div id="contact-details"></div>

          <!-- Social links -->
          <div style="margin-top:2rem;">
            <span class="section-label">Follow My Work</span>
            <div style="display:flex; gap:1rem; margin-top:.8rem;">
              <a id="wa-link" href="#" target="_blank" class="btn btn-primary" style="gap:.5rem; font-size:.75rem;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.089.537 4.055 1.475 5.765L.057 23.882l6.284-1.645A11.937 11.937 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.853 0-3.614-.5-5.143-1.372l-.369-.218-3.728.977.995-3.637-.24-.374A9.963 9.963 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
                WhatsApp
              </a>
              <a id="ig-link" href="#" target="_blank" class="btn btn-outline" style="font-size:.75rem;">Instagram</a>
            </div>
          </div>
        </div>

        <!-- Contact Form -->
        <div class="reveal">
          <div class="contact-form">
            <h3 style="margin-bottom:1.8rem; font-size:1.5rem;">Send a Message</h3>
            <form id="contact-form" method="POST">
              <div class="form-row">
                <div class="form-group">
                  <label for="name">Your Name *</label>
                  <input type="text" id="name" name="name" placeholder="Priya Sharma" required>
                </div>
                <div class="form-group">
                  <label for="phone">Phone Number</label>
                  <input type="tel" id="phone" name="phone" placeholder="+91 98765 43210">
                </div>
              </div>
              <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
              </div>
              <div class="form-group">
                <label for="project-type">Project Type</label>
                <select id="project-type" name="project_type">
                  <option value="">Select a service…</option>
                  <option>Residential Interior Design</option>
                  <option>Corporate / Office Design</option>
                  <option>Architecture</option>
                  <option>Space Planning</option>
                  <option>Working Drawings</option>
                  <option>Site Coordination</option>
                  <option>Landscape Design</option>
                  <option>Turnkey Project</option>
                  <option>Other / Not sure yet</option>
                </select>
              </div>
              <div class="form-group">
                <label for="budget">Approximate Budget</label>
                <select id="budget" name="budget">
                  <option value="">Prefer not to say</option>
                  <option>Under ₹5 Lakhs</option>
                  <option>₹5 – 15 Lakhs</option>
                  <option>₹15 – 30 Lakhs</option>
                  <option>₹30 Lakhs+</option>
                </select>
              </div>
              <div class="form-group">
                <label for="message">Tell Me About Your Project *</label>
                <textarea id="message" name="message" placeholder="Briefly describe your space, requirements, and any specific ideas you have in mind…" required></textarea>
              </div>
              <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center;">Send Message</button>
              <div class="form-success" id="form-success">
                ✅ Thank you! Your message has been sent. I'll be in touch within 24 hours.
              </div>
            </form>
          </div>
        </div>

      </div>
    </div>
  </section>

  <footer id="site-footer"></footer>
  <div class="float-social" id="float-social"></div>

  <script src="js/config.js"></script>
  <script>
    // Set social links from config after DOM loads (can't use main.js renderContact yet)
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('wa-link').href = 'https://wa.me/' + SITE.contact.whatsapp;
      document.getElementById('ig-link').href = 'https://instagram.com/' + SITE.contact.instagram;
    });
  </script>
  <script src="js/main.js"></script>
</body>
</html>
